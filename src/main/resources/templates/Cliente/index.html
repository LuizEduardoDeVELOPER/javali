<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Vendas de Tendas</title>
    <link rel="stylesheet" th:href="@{/css/portal.css}">
</head>
<body>

    <nav>
        <div class="menu-links">
            <a href="#">Início</a>
            <a href="#vendas">Produtos</a>
            <a href="#">Pedidos</a>
            <a href="#">Contato</a>
        </div>
        <a th:href="@{/login}" class="btn-login">Login</a>
    </nav>

    <header class="hero-carrossel" 
            th:style="'background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url(' + @{/img/imgtenda1.jpeg} + ');'">
        <div class="hero-content">
            <h1>Bem-Vindo ao Sistema de Vendas de Tendas</h1>
            <p>As melhores tendas para seu evento!</p>
            <a href="#vendas" class="btn-ver-produtos">Ver Produtos</a>
        </div>
    </header>

    <div class="search-container">
        <div class="search-box">
            <input type="text" placeholder="Buscar tendas...">
            <button>Buscar</button>
        </div>
    </div>
<main class="container" id="vendas">
    <h2 style="color: #333; margin-bottom: 25px; border-bottom: 1px solid #ddd; padding-bottom: 10px;">
        Tendas em Destaque
    </h2>

    <div class="grid-vendas">
        <div class="card-venda" th:each="t : ${produtos}">
            <img th:src="${t.imagemUrl != null ? t.imagemUrl : '/img/imgtenda1.jpeg'}" alt="Tenda">
            <div class="card-body">
                <h3 th:text="${t.nome}">Nome da Tenda</h3>
                <div class="preco" th:text="'R$ ' + ${t.preco}">R$ 0,00</div>
                <button class="btn-comprar">Comprar</button>
            </div>
        </div>
    </div>
</main>

<section class="container" id="sobre" style="background: #fff; margin-top: 40px;">
    <h2 style="text-align:center; color: #2b579a;">SOBRE A CASA DAS TENDAS</h2>
    <p style="text-align:center; max-width: 800px; margin: 0 auto; color: #666;">
        Fabricação própria na QNH 3 de Taguatinga Norte. Qualidade e durabilidade para seu evento.
    </p>
</section>
</body>
</html>
