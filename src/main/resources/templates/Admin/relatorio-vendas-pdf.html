<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Relatório de Fechamento - Casa das Tendas</title>
    <style>
        body { font-family: sans-serif; color: #333; padding: 40px; }
        .header { text-align: center; border-bottom: 2px solid #ff6600; padding-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
        .total-box { margin-top: 30px; text-align: right; font-size: 1.5rem; color: #ff6600; }
        @media print { .btn-print { display: none; } } /* Esconde o botão na hora de gerar o PDF */
    </style>
</head>
<body onload="window.print()"> <div class="header">
        <h1>CASA DAS TENDAS - RELATÓRIO EXECUTIVO</h1>
        <p th:text="'Gerado em: ' + ${#temporals.format(#temporals.createNow(), 'dd/MM/yyyy HH:mm')}"></p>
    </div>

    <h3>📦 Inventário de Produtos</h3>
    <table>
        <thead>
            <tr>
                <th>Produto</th>
                <th>Tamanho</th>
                <th>Estoque Atual</th>
                <th>Preço Unitário</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${produtos}">
                <td th:text="${p.nome}"></td>
                <td th:text="${p.tamanho}"></td>
                <td th:text="${p.quantidade}"></td>
                <td th:text="'R$ ' + ${p.preco}"></td>
            </tr>
        </tbody>
    </table>

    <h3>🛒 Histórico de Vendas Controladas</h3>
    <table>
        <thead>
            <tr>
                <th>Data</th>
                <th>Item</th>
                <th>Vendedor (Fixo)</th>
                <th>Valor</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="v : ${vendas}">
                <td th:text="${#temporals.format(v.dataHora, 'dd/MM/yyyy')}"></td>
                <td th:text="${v.nomeTenda}"></td>
                <td>Vendedor Administrativo</td> <td th:text="'R$ ' + ${v.valorVenda}"></td>
            </tr>
        </tbody>
    </table>

    <div class="total-box">
        <strong>FATURAMENTO TOTAL: R$ <span th:text="${totalFaturado}">0,00</span></strong>
    </div>

    <button class="btn-print" onclick="window.print()" style="margin-top: 20px; padding: 10px 20px; background: #ff6600; color: white; border: none; cursor: pointer;">Salvar como PDF</button>
</body>
</html>
