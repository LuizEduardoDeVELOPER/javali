<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo - Casa das Tendas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">CASA DAS TENDAS</div>
        <nav>
            <a th:href="@{/admin}" class="nav-item active">🏠 Dashboard</a>
            <a th:href="@{/admin/produtos}" class="nav-item">📦 Produtos</a>
            <a th:href="@{/admin/vendas}" class="nav-item">🛒 Vendas</a>
            <a th:href="@{/admin/despesas}" class="nav-item">💸 Despesas</a>
            <a th:href="@{/admin/relatorios}" class="nav-item">📊 Relatórios</a>
        </nav>
    </aside>

    <main>
        <header>
            <h1>Painel Administrativo</h1>
            <p>Visão geral do faturamento e estoque</p>
        </header>

        <div class="dashboard-grid">
            
            <div class="card-kpi" style="border-top-color: #27ae60;">
                <h3>💰 Faturamento</h3>
                <p th:text="'R$ ' + ${#numbers.formatDecimal(totalFaturado, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</p>
            </div>

            <div class="card-kpi" style="border-top-color: #e74c3c;">
                <h3>📉 Gastos Totais</h3>
                <p th:text="'R$ ' + ${#numbers.formatDecimal(totalGastos, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</p>
            </div>

            <div class="card-kpi" style="border-top-color: #2980b9;">
                <h3>🚀 Lucro Líquido</h3>
                <p th:text="'R$ ' + ${#numbers.formatDecimal(lucroLiquido, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</p>
            </div>

            <div class="card-kpi" style="border-top-color: #ff6600;">
                <h3>🛍️ Vendas</h3>
                <p th:text="${totalVendas}">0</p>
            </div>

        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
            
            <section>
                <h2 style="color: #ff6600; margin-top: 0;">📊 Desempenho Semanal</h2>
                <canvas id="graficoVendas"></canvas>
            </section>

            <section>
                <h2 style="color: #ff6600; margin-top: 0;">➕ Cadastrar Tenda</h2>
                <form action="/cadastrar" method="post" style="display: flex; flex-direction: column; gap: 10px;">
                    <input type="text" name="nome" placeholder="Modelo" required>
                    <input type="text" name="tamanho" placeholder="Tamanho">
                    <input type="number" step="0.01" name="preco" placeholder="Preço (R$)">
                    <input type="number" name="quantidade" placeholder="Estoque">
                    <button type="submit">Salvar Tenda</button>
                </form>
            </section>

        </div>
    </main>

    <script>
        const ctx = document.getElementById('graficoVendas');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab', 'Dom'],
                datasets: [{
                    label: 'Vendas da Semana',
                    data: [2, 4, 3, 5, 6, 4, 3],
                    backgroundColor: '#ff6600',
                    borderWidth: 0
                }]
            },
            options: {
                scales: {
                    y: { beginAtZero: true, grid: { color: '#333' }, ticks: { color: '#fff' } },
                    x: { ticks: { color: '#fff' } }
                }
            }
        });
    </script>

</body>
</html>
